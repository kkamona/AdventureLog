name: E2E Tests

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Start the full stack via docker-compose ───────────────────────────
      - name: Start AdventureLog stack
        run: |
          cp .env.example .env 2>/dev/null || cp _env .env
          docker compose up -d --wait
        env:
          FRONTEND_PORT: 8015
          BACKEND_PORT: 8016

      - name: Wait for frontend to be healthy
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8015 > /dev/null; then
              echo "Frontend is up"; break
            fi
            echo "Waiting... ($i)"; sleep 5
          done

      - name: Wait for backend to be healthy
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8016/api/ > /dev/null 2>&1; then
              echo "Backend is up"; break
            fi
            echo "Waiting... ($i)"; sleep 5
          done

      # ─── Node & Playwright setup ───────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/e2e/package-lock.json

      - name: Install dependencies
        working-directory: frontend/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend/e2e
        run: npx playwright install --with-deps chromium

      # ─── Run tests ────────────────────────────────────────────────────────
      - name: Run E2E tests
        working-directory: frontend/e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost:8015
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'admin' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'admin' }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL || 'admin@example.com' }}

      # ─── Artifacts ────────────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/e2e/playwright-report/
          retention-days: 7

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/e2e/test-results/
          retention-days: 3

      - name: Tear down stack
        if: always()
        run: docker compose down -v
