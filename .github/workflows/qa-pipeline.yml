name: AdventureLog QA Pipeline

on:
  push:
    branches:
      - main
      - 'qa/**'
  pull_request:
    branches:
      - main

# ---------------------------------------------------------------------------
# Quality Gates enforced by this pipeline
#   QG-3  backend-tests  ── pytest --fail-under=70  (hard block)
#   QG-4  api-smoke-test ── 3 curl smoke checks     (hard block)
#   QG-1  e2e-tests      ── ≥ 95 % Playwright pass  (hard block, PR merge denied)
#   QG-2  e2e-tests      ── 0 failures in auth.spec.ts (hard block)
#   QG-5  e2e-tests      ── ≤ 10 min suite duration (soft warning only)
# ---------------------------------------------------------------------------

jobs:

  # -------------------------------------------------------------------------
  # JOB 1 – Backend Unit Tests (pytest)   QG-3: coverage ≥ 70 %
  # -------------------------------------------------------------------------
  backend-tests:
    name: "Backend Unit Tests (pytest)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run pytest
        run: |
          mkdir -p qa/reports
          pytest qa/test-cases/backend/ -v --tb=short \
            --cov=qa/test-cases/backend \
            --cov-report=term-missing \
            --cov-report=xml:qa/reports/coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: qa/reports/coverage.xml
          retention-days: 30

  

  # -------------------------------------------------------------------------
  # JOB 3 – Playwright E2E Tests   QG-1, QG-2, QG-5
  #
  # Hard-block gates (pipeline fails, PR merge to main denied):
  #   QG-1  ≥ 95 % overall Playwright pass rate
  #   QG-2  0 failures in auth.spec.ts  (CRITICAL module, risk score 20)
  #
  # Soft-warning gate (logged, does not fail the job):
  #   QG-5  Suite duration ≤ 10 minutes
  # -------------------------------------------------------------------------
  e2e-tests:
    name: "E2E Tests (Playwright – Chromium)"
    runs-on: ubuntu-latest
    needs: api-smoke-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node + dependencies ───────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        working-directory: ./frontend
        run: npm ci --force

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      # ── Environment ───────────────────────────────────────────────────────
      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          PUBLIC_SERVER_URL=http://server:80
          ORIGIN=http://localhost:8015
          BODY_SIZE_LIMIT=Infinity
          FRONTEND_PORT=8015
          PGHOST=db
          POSTGRES_DB=database
          POSTGRES_USER=adventure
          POSTGRES_PASSWORD=changeme123
          SECRET_KEY=ci-test-secret-key-do-not-use-in-production
          DJANGO_ADMIN_USERNAME=admin
          DJANGO_ADMIN_PASSWORD=Admin1234!
          DJANGO_ADMIN_EMAIL=admin@adventurelog.qa
          PUBLIC_URL=http://localhost:8016
          CSRF_TRUSTED_ORIGINS=http://localhost:8016,http://localhost:8015
          DEBUG=True
          FRONTEND_URL=http://localhost:8015
          BACKEND_PORT=8016
          DISABLE_REGISTRATION=False
          EOF

      # ── Start full stack ──────────────────────────────────────────────────
      - name: Start database container
        run: docker compose up -d db

      - name: Wait for database to be ready
        run: |
          for i in {1..40}; do
            if docker compose exec -T db pg_isready -U adventure -d database > /dev/null 2>&1; then
              echo "✅ Database ready (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}/40: waiting 5s..."
            sleep 5
          done
          echo "❌ Database never became ready"
          docker compose logs db
          exit 1

      - name: Start backend and frontend containers
        run: |
          docker compose up -d server web
          echo "Waiting 60s for Django migrations and SvelteKit build..."
          sleep 60

      - name: Show container status
        run: docker compose ps

      - name: Wait for frontend to respond
        run: |
          echo "Polling http://localhost:8015/ ..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 \
              http://localhost:8015/ 2>/dev/null || echo "000")
            echo "Attempt ${i}/30: frontend HTTP ${STATUS}"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
              echo "✅ Frontend is ready"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Frontend never became ready"
          docker compose logs web --tail=80
          exit 1

      # ── Record suite start time (QG-5) ────────────────────────────────────
      - name: Record E2E suite start time
        id: suite_start
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      # ── Run Playwright (QG-1 and QG-2 enforced here) ─────────────────────
      - name: Run Playwright E2E tests
        working-directory: ./frontend
        id: playwright_run
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8015
          CI: true
        run: |
          mkdir -p ../qa/reports
          npx playwright test ../qa/test-cases/e2e \
            --config=playwright.config.ts \
            --reporter=list,html,junit

      # ── QG-5: soft duration warning ───────────────────────────────────────
      - name: Check E2E suite duration (QG-5 soft warning)
        if: always()
        run: |
          START=${{ steps.suite_start.outputs.start }}
          END=$(date +%s)
          ELAPSED=$(( END - START ))
          MINUTES=$(( ELAPSED / 60 ))
          SECONDS=$(( ELAPSED % 60 ))
          echo "E2E suite completed in ${MINUTES}m ${SECONDS}s (${ELAPSED}s total)"
          if [ "$ELAPSED" -gt 600 ]; then
            echo "⚠️  QG-5 WARNING: Suite duration ${MINUTES}m ${SECONDS}s exceeds the 10-minute soft threshold."
            echo "    Consider parallelising tests or optimising slow scenarios."
          else
            echo "✅ QG-5 PASS: Suite duration within 10-minute threshold."
          fi

      # ── Save logs and artifacts ───────────────────────────────────────────
      - name: Save container logs
        if: always()
        run: |
          mkdir -p qa/reports
          docker compose logs        > qa/reports/e2e-all-containers.log 2>&1
          docker compose logs server > qa/reports/e2e-backend.log        2>&1
          docker compose logs web    > qa/reports/e2e-frontend.log       2>&1
          docker compose logs db     > qa/reports/e2e-database.log       2>&1

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: qa/reports/playwright-report/
          retention-days: 30

      - name: Upload Playwright JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-junit-results
          path: qa/reports/playwright-results.xml
          retention-days: 30

      - name: Upload Playwright test artifacts (screenshots / videos / traces)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failure-artifacts
          path: qa/reports/test-results/
          retention-days: 30

      - name: Upload container logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-docker-logs
          path: qa/reports/e2e-*.log
          retention-days: 7

      - name: Shut down containers
        if: always()
        run: docker compose down -v
