# .github/workflows/qa-pipeline.yml
# AdventureLog QA Pipeline — Assignment 1
# Runs on every push to main/qa branches and on all Pull Requests

name: AdventureLog QA Pipeline

on:
  push:
    branches:
      - main
      - 'qa/**'        # matches qa/assignment-1, qa/assignment-2, etc.
  pull_request:
    branches:
      - main

# ─────────────────────────────────────────────────────────────────
# JOB 1: Backend Unit Tests (pytest)
# Runs Django-independent unit tests + logic tests
# ─────────────────────────────────────────────────────────────────
jobs:
  backend-tests:
    name: "🧪 Backend Unit Tests (pytest)"
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Step 3: Install pytest (no Django needed for smoke tests)
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      # Step 4: Run pytest on our QA test folder
      - name: Run pytest
        run: |
          pytest qa/test-cases/backend/ -v --tb=short \
            --cov=qa/test-cases/backend \
            --cov-report=term-missing \
            --cov-report=xml:qa/reports/coverage.xml

      # Step 5: Upload coverage report as a downloadable artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()    # upload even if tests fail
        with:
          name: coverage-report
          path: qa/reports/coverage.xml
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: API Smoke Test (curl against live Docker stack)
  # Boots the full AdventureLog Docker Compose stack and
  # verifies the API is responding
  # ─────────────────────────────────────────────────────────────────
  api-smoke-test:
    name: "API Smoke Test (Docker + curl)"
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Create the .env file
      - name: Create .env file for Docker Compose
        run: |
          cat > .env << 'EOF'
          PGHOST=db
          PGDATABASE=database
          PGUSER=adventure
          PGPASSWORD=changeme123
          SECRET_KEY=ci-test-secret-key-not-for-production
          DJANGO_ADMIN_USERNAME=admin
          DJANGO_ADMIN_PASSWORD=Admin123!
          DJANGO_ADMIN_EMAIL=admin@adventurelog.qa
          PUBLIC_URL=http://localhost:8016
          CSRF_TRUSTED_ORIGINS=http://localhost:8016,http://localhost:8015
          DEBUG=True
          FRONTEND_URL=http://localhost:8015
          BACKEND_PORT=8016
          DISABLE_REGISTRATION=False
          PUBLIC_SERVER_URL=http://server:8000
          ORIGIN=http://localhost:8015
          BODY_SIZE_LIMIT=Infinity
          EOF

      # Step 2: Start ONLY the database first, and wait for it to be healthy
      # This is the critical fix — we give PostGIS time to initialize
      # before the backend tries to connect
      - name: Start database container only
        run: |
          docker compose up -d db
          echo "Waiting for PostGIS to fully initialize (this takes ~60s on first boot)..."

      - name: Wait for database to be healthy
        run: |
          echo "Polling database readiness..."
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U adventure -d database > /dev/null 2>&1; then
              echo "✅ Database is ready after $i attempts"
              break
            fi
            echo "Attempt $i/30: DB not ready yet, waiting 5s..."
            sleep 5
            if [ $i -eq 30 ]; then
              echo "❌ Database did not become ready in time"
              docker compose logs db
              exit 1
            fi
          done

      # Step 3: Now start the remaining containers (backend + frontend + cdn)
      - name: Start remaining containers
        run: |
          docker compose up -d server cdn frontend
          echo "Backend containers started, giving them time to run migrations..."
          sleep 20

      # Step 4: Show container status
      - name: Show running containers
        run: docker compose ps

      # Step 5: Show backend logs so far
      - name: Show backend logs
        run: docker compose logs server --tail=60

      # Step 6: Wait for the backend API to respond
      - name: Wait for API to be ready
        run: |
          echo "Polling API readiness..."
          for i in {1..24}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8016/api/ 2>/dev/null || echo "000")
            echo "Attempt $i/24: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
              echo "✅ API is responding (HTTP $STATUS)"
              break
            fi
            sleep 5
            if [ $i -eq 24 ]; then
              echo "❌ API did not start in time. Final backend logs:"
              docker compose logs server --tail=100
              exit 1
            fi
          done

      # Step 7: Run the actual smoke tests
      - name: "Smoke test: GET /api/ returns 200"
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8016/api/)
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Expected 200 but got $RESPONSE"
            exit 1
          fi
          echo "✅ API root returned 200 OK"

      - name: "Smoke test: /api/adventures/ blocks unauthenticated access"
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8016/api/adventures/)
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" = "401" ] || [ "$RESPONSE" = "403" ]; then
            echo "✅ Unauthenticated access correctly blocked (HTTP $RESPONSE)"
          else
            echo "❌ Expected 401/403 but got $RESPONSE"
            exit 1
          fi

      - name: "Smoke test: Login endpoint responds (not 404)"
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8016/api/auth/login/ \
            -H "Content-Type: application/json" \
            -d '{"username":"wrong","password":"wrong"}')
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" = "400" ] || [ "$RESPONSE" = "401" ] || [ "$RESPONSE" = "405" ]; then
            echo "✅ Login endpoint exists (HTTP $RESPONSE)"
          else
            echo "❌ Unexpected response $RESPONSE — endpoint may not exist"
            exit 1
          fi

      - name: "Smoke test: Admin panel accessible"
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8016/admin/)
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "301" ] || [ "$RESPONSE" = "302" ]; then
            echo "✅ Admin panel accessible (HTTP $RESPONSE)"
          else
            echo "❌ Admin panel returned $RESPONSE"
            exit 1
          fi

      # Step 8: Save logs as artifacts
      - name: Save all container logs
        if: always()
        run: |
          mkdir -p qa/reports
          docker compose logs > qa/reports/docker-compose.log 2>&1
          docker compose logs server > qa/reports/backend.log 2>&1
          docker compose logs db > qa/reports/database.log 2>&1

      - name: Upload logs as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-logs
          path: qa/reports/*.log
          retention-days: 7

      - name: Shut down containers
        if: always()
        run: docker compose down -v