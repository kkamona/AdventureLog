name: AdventureLog QA Pipeline

on:
  push:
    branches:
      - main
      - 'qa/**'
  pull_request:
    branches:
      - main

# ---------------------------------------------------------------------------
# Quality Gates enforced by this pipeline
#   QG-3  backend-tests  ── pytest --fail-under=70        (hard block)
#   QG-4  api-smoke-test ── 3 curl smoke checks           (hard block)
#   QG-1  e2e-tests      ── ≥ 95 % overall Playwright pass rate (hard block)
#   QG-2  e2e-tests      ── 0 failures in auth.spec.ts    (hard block)
#   QG-5  e2e-tests      ── ≤ 10 min suite duration       (soft warning only)
# ---------------------------------------------------------------------------

jobs:

  # -------------------------------------------------------------------------
  # JOB 1 – Backend Unit Tests (pytest)   QG-3: coverage ≥ 70 %
  # -------------------------------------------------------------------------
  backend-tests:
    name: "Backend Unit Tests (pytest)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov requests

      - name: Run pytest with coverage (QG-3)
        run: |
          mkdir -p frontend/reports
          pytest frontend/test-cases/backend/ -v --tb=short \
            --cov=frontend/test-cases/backend \
            --cov-report=term-missing \
            --cov-report=xml:frontend/reports/coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: frontend/reports/coverage.xml
          retention-days: 30

  # -------------------------------------------------------------------------
  # JOB 2 – API Smoke Test (Docker + curl)   QG-4: 3 smoke checks
  # -------------------------------------------------------------------------
  api-smoke-test:
    name: "API Smoke Test (Docker + curl)"
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install curl
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          PUBLIC_SERVER_URL=http://server:80
          ORIGIN=http://localhost:8015
          BODY_SIZE_LIMIT=Infinity
          FRONTEND_PORT=8015
          PGHOST=db
          POSTGRES_DB=database
          POSTGRES_USER=adventure
          POSTGRES_PASSWORD=changeme123
          SECRET_KEY=ci-test-secret-key-do-not-use-in-production
          DJANGO_ADMIN_USERNAME=admin
          DJANGO_ADMIN_PASSWORD=Admin1234!
          DJANGO_ADMIN_EMAIL=admin@adventurelog.qa
          PUBLIC_URL=http://localhost:8016
          CSRF_TRUSTED_ORIGINS=http://localhost:8016,http://localhost:8015
          DEBUG=True
          FRONTEND_URL=http://localhost:8015
          BACKEND_PORT=8016
          DISABLE_REGISTRATION=False
          EOF

      - name: Reset Docker auth
        run: docker logout

      - name: Start database container
        run: docker compose up -d db

      - name: Wait for database to be ready
        run: |
          echo "Waiting for PostGIS to initialize..."
          for i in {1..40}; do
            if docker compose exec -T db pg_isready -U adventure -d database > /dev/null 2>&1; then
              echo "✅ Database ready after ${i} attempts (~$((i*5))s)"
              exit 0
            fi
            echo "Attempt ${i}/40: not ready yet, waiting 5s..."
            sleep 5
          done
          echo "❌ Database never became ready. Logs:"
          docker compose logs db
          exit 1

      - name: Start backend container
        run: |
          docker compose up -d server
          echo "Waiting 45s for Django to run migrations..."
          sleep 45

      - name: Show container status
        run: docker compose ps

      - name: Show backend logs
        run: docker compose logs server --tail=100

      - name: Wait for API to respond
        run: |
          echo "Polling http://localhost:8016/ ..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 \
              http://localhost:8016/ 2>/dev/null || echo "000")
            echo "Attempt ${i}/30: HTTP ${STATUS}"
            if [ "$STATUS" != "000" ] && [ "$STATUS" != "502" ] && [ "$STATUS" != "503" ]; then
              echo "✅ API is responding (HTTP ${STATUS})"
              exit 0
            fi
            sleep 5
          done
          echo "❌ API never responded. Final backend logs:"
          docker compose logs server --tail=150
          exit 1

      - name: Discover and log API routes
        run: |
          echo "=== Endpoint status map ==="
          for EP in "/" "/api/" "/admin/" \
                    "/api/locations/" "/api/collections/" "/api/itineraries/" \
                    "/api/notes/" "/api/checklists/" "/api/categories/" \
                    "/api/transportations/" "/api/images/" "/api/trails/" \
                    "/api/activities/" "/api/visits/" "/api/lodging/" \
                    "/api/attachments/" "/api/search/"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 \
              http://localhost:8016${EP} 2>/dev/null || echo "000")
            echo "  http://localhost:8016${EP}  →  HTTP ${STATUS}"
          done
          echo ""
          echo "=== /api/ response body ==="
          curl -s --connect-timeout 5 http://localhost:8016/api/ \
            | python3 -m json.tool 2>/dev/null \
            || curl -s --connect-timeout 5 http://localhost:8016/api/

      # ── QG-4: 3 hard-block smoke checks ──────────────────────────────────

      - name: "QG-4 Smoke 1: Server alive on port 8016"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8016/)
          echo "HTTP ${STATUS}"
          [ "$STATUS" != "000" ] \
            && echo "✅ PASS — server alive (HTTP ${STATUS})" \
            || { echo "❌ FAIL — no response from backend"; exit 1; }

      - name: "QG-4 Smoke 2: Django admin panel accessible"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8016/admin/)
          echo "HTTP ${STATUS}"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "✅ PASS — admin panel reachable (HTTP ${STATUS})"
          else
            echo "❌ FAIL — /admin/ returned ${STATUS}"
            exit 1
          fi

      - name: "QG-4 Smoke 3: Locations endpoint requires authentication"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8016/api/locations/)
          echo "HTTP ${STATUS}"
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "✅ PASS — unauthenticated access blocked (HTTP ${STATUS})"
          elif [ "$STATUS" = "200" ]; then
            echo "⚠️  WARNING — returned 200 without auth (check if public listing is intentional)"
          else
            echo "❌ FAIL — unexpected status ${STATUS}"
            exit 1
          fi

      - name: Save container logs
        if: always()
        run: |
          mkdir -p frontend/reports
          docker compose logs        > frontend/reports/smoke-all-containers.log 2>&1
          docker compose logs server > frontend/reports/smoke-backend.log        2>&1
          docker compose logs db     > frontend/reports/smoke-database.log       2>&1

      - name: Upload smoke-test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-docker-logs
          path: frontend/reports/smoke-*.log
          retention-days: 7

      - name: Shut down containers
        if: always()
        run: docker compose down -v

  # -------------------------------------------------------------------------
  # JOB 3 – Playwright E2E Tests
  #
  # Hard-block gates enforced by post-run XML analysis:
  #   QG-1  ≥ 95 % overall Playwright pass rate
  #   QG-2  0 failures in auth.spec.ts  (CRITICAL module, risk score 20)
  #
  # Soft-warning gate (logged, does NOT fail the job):
  #   QG-5  Suite duration ≤ 10 minutes
  # -------------------------------------------------------------------------
  e2e-tests:
    name: "E2E Tests (Playwright – Chromium)"
    runs-on: ubuntu-latest
    needs: api-smoke-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node + dependencies ───────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      # ── Environment ───────────────────────────────────────────────────────
      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          PUBLIC_SERVER_URL=http://server:80
          ORIGIN=http://localhost:8015
          BODY_SIZE_LIMIT=Infinity
          FRONTEND_PORT=8015
          PGHOST=db
          POSTGRES_DB=database
          POSTGRES_USER=adventure
          POSTGRES_PASSWORD=changeme123
          SECRET_KEY=ci-test-secret-key-do-not-use-in-production
          DJANGO_ADMIN_USERNAME=admin
          DJANGO_ADMIN_PASSWORD=Admin1234!
          DJANGO_ADMIN_EMAIL=admin@adventurelog.qa
          PUBLIC_URL=http://localhost:8016
          CSRF_TRUSTED_ORIGINS=http://localhost:8016,http://localhost:8015
          DEBUG=True
          FRONTEND_URL=http://localhost:8015
          BACKEND_PORT=8016
          DISABLE_REGISTRATION=False
          EOF

      # ── Start full stack ──────────────────────────────────────────────────
      - name: Reset Docker auth
        run: docker logout

      - name: Start database container
        run: docker compose up -d db

      - name: Wait for database to be ready
        run: |
          for i in {1..40}; do
            if docker compose exec -T db pg_isready -U adventure -d database > /dev/null 2>&1; then
              echo "✅ Database ready (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}/40: waiting 5s..."
            sleep 5
          done
          echo "❌ Database never became ready"
          docker compose logs db
          exit 1

      - name: Start backend and frontend containers
        run: |
          docker compose up -d server web
          echo "Waiting 60s for Django migrations and SvelteKit build..."
          sleep 60

      - name: Show container status
        run: docker compose ps

      - name: Wait for frontend to respond
        run: |
          echo "Polling http://localhost:8015/ ..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 \
              http://localhost:8015/ 2>/dev/null || echo "000")
            echo "Attempt ${i}/30: frontend HTTP ${STATUS}"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
              echo "✅ Frontend is ready"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Frontend never became ready"
          docker compose logs web --tail=80
          exit 1

      # ── Pre-create report directories ────────────────────────────────────
      - name: Create report output directories
        run: |
          mkdir -p frontend/reports/playwright-report
          mkdir -p frontend/reports/test-results

      # ── Record suite start time (QG-5) ────────────────────────────────────
      - name: Record E2E suite start time
        id: suite_start
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      # ── Run Playwright – allow failure so we can enforce QG-1/QG-2 below ─
      - name: Run Playwright E2E tests
        id: playwright_run
        working-directory: ./frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8015
          CI: true
        run: npx playwright test --config=playwright.config.ts
        continue-on-error: true   # gate enforcement happens in the next step

      # ── QG-1 + QG-2: parse JUnit XML and enforce hard thresholds ─────────
      - name: "Enforce QG-1 (≥ 95 % pass) and QG-2 (0 auth failures)"
        if: always()
        run: |
          REPORT="frontend/reports/playwright-results.xml"

          if [ ! -f "$REPORT" ]; then
            echo "❌ JUnit report not found at $REPORT – treating as total failure."
            exit 1
          fi

          # ── Parse totals from the <testsuites> root element ──────────────
          TESTS=$(python3 -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('$REPORT')
          root = tree.getroot()
          # Handle both <testsuites> and <testsuite> as root
          if root.tag == 'testsuites':
              tests    = int(root.get('tests',    0))
              failures = int(root.get('failures', 0))
              errors   = int(root.get('errors',   0))
          else:
              tests    = int(root.get('tests',    0))
              failures = int(root.get('failures', 0))
              errors   = int(root.get('errors',   0))
          print(f'{tests} {failures} {errors}')
          ")

          TOTAL=$(echo $TESTS | awk '{print $1}')
          FAILURES=$(echo $TESTS | awk '{print $2}')
          ERRORS=$(echo $TESTS | awk '{print $3}')
          BAD=$(( FAILURES + ERRORS ))
          PASSED=$(( TOTAL - BAD ))

          echo ""
          echo "════════════════════════════════════════"
          echo "  Playwright Results Summary"
          echo "  Total : $TOTAL"
          echo "  Passed: $PASSED"
          echo "  Failed: $FAILURES"
          echo "  Errors: $ERRORS"
          echo "════════════════════════════════════════"

          # ── QG-1: overall pass rate ≥ 95 % ──────────────────────────────
          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(python3 -c "print(round($PASSED / $TOTAL * 100, 1))")
            echo "QG-1 Pass rate: ${PASS_RATE}%  (threshold: 95%)"
            BELOW=$(python3 -c "print(1 if $PASSED / $TOTAL * 100 < 95 else 0)")
            if [ "$BELOW" = "1" ]; then
              echo "❌ QG-1 FAIL — pass rate ${PASS_RATE}% is below the 95% threshold."
              echo "   PR merge to main is BLOCKED."
              exit 1
            else
              echo "✅ QG-1 PASS — pass rate ${PASS_RATE}%"
            fi
          else
            echo "❌ QG-1 FAIL — no tests were collected (total=0)."
            exit 1
          fi

          # ── QG-2: 0 failures specifically in auth.spec.ts ────────────────
          AUTH_FAILURES=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$REPORT')
          root = tree.getroot()
          count = 0
          for tc in root.iter('testcase'):
              classname = tc.get('classname', '')
              name      = tc.get('name', '')
              if 'auth' in classname.lower() or 'auth' in name.lower():
                  if tc.find('failure') is not None or tc.find('error') is not None:
                      count += 1
          print(count)
          ")

          echo "QG-2 auth.spec.ts failures: ${AUTH_FAILURES}  (threshold: 0)"
          if [ "$AUTH_FAILURES" -gt 0 ]; then
            echo "❌ QG-2 FAIL — ${AUTH_FAILURES} failure(s) detected in auth.spec.ts."
            echo "   This is a CRITICAL module (risk score 20). PR merge to main is BLOCKED."
            exit 1
          else
            echo "✅ QG-2 PASS — 0 failures in auth.spec.ts"
          fi

          echo ""
          echo "✅ All hard-block quality gates passed."

      # ── QG-5: soft duration warning ───────────────────────────────────────
      - name: "QG-5: Check E2E suite duration (soft warning)"
        if: always()
        run: |
          START=${{ steps.suite_start.outputs.start }}
          END=$(date +%s)
          ELAPSED=$(( END - START ))
          MINUTES=$(( ELAPSED / 60 ))
          SECS=$(( ELAPSED % 60 ))
          echo "E2E suite completed in ${MINUTES}m ${SECS}s (${ELAPSED}s total)"
          if [ "$ELAPSED" -gt 600 ]; then
            echo "⚠️  QG-5 WARNING: Suite took ${MINUTES}m ${SECS}s — exceeds the 10-minute soft threshold."
            echo "    Consider parallelising tests or splitting slow scenarios."
          else
            echo "✅ QG-5 PASS: Suite duration within the 10-minute threshold."
          fi

      # ── Save all logs and artifacts ───────────────────────────────────────
      - name: Save container logs
        if: always()
        run: |
          mkdir -p frontend/reports
          docker compose logs        > frontend/reports/e2e-all-containers.log 2>&1
          docker compose logs server > frontend/reports/e2e-backend.log        2>&1
          docker compose logs web    > frontend/reports/e2e-frontend.log       2>&1
          docker compose logs db     > frontend/reports/e2e-database.log       2>&1

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: frontend/reports/playwright-report/
          retention-days: 30

      - name: Upload Playwright JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-junit-results
          path: frontend/reports/playwright-results.xml
          retention-days: 30

      - name: Upload failure artifacts (screenshots / videos / traces)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failure-artifacts
          path: frontend/reports/test-results/
          retention-days: 30

      - name: Upload container logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-docker-logs
          path: frontend/reports/e2e-*.log
          retention-days: 7

      - name: Shut down containers
        if: always()
        run: docker compose down -v
